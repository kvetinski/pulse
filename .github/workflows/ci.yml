name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust Quality Gates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            protobuf-compiler \
            libprotobuf-dev \
            build-essential \
            cmake \
            pkg-config \
            libcurl4-openssl-dev \
            libssl-dev \
            libsasl2-dev \
            zlib1g-dev \
            libzstd-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Run quality gates
        run: make ci-check

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.31.0

      - name: Validate Kubernetes manifests
        run: |
          kubectl kustomize k8s > /dev/null
          kubectl kustomize k8s/overlays/kind > /dev/null
          kubectl kustomize k8s/overlays/staging > /dev/null
          kubectl kustomize k8s/overlays/prod > /dev/null
          kubectl kustomize k8s/examples/alerts > /dev/null

      - name: Generate performance report artifacts (CI fixture)
        run: |
          PERF_OVERLAY=ci \
          PERF_REPORT_DIR=artifacts/reliability \
          PERF_HISTORY_FILE=artifacts/reliability/perf-history.jsonl \
          scripts/reliability/generate_ci_perf_artifacts.sh

      - name: Upload performance artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-artifacts-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            artifacts/reliability/perf-gate-*.json
            artifacts/reliability/perf-gate-*.log
            artifacts/reliability/perf-report-*.md
            artifacts/reliability/perf-report-*.svg
            artifacts/reliability/performance-history.html
            artifacts/reliability/perf-history-*.svg
            artifacts/reliability/perf-history.jsonl
          if-no-files-found: warn
          retention-days: 14

  integration-compose:
    name: Integration (Kafka + Redis via Compose)
    runs-on: ubuntu-latest
    needs: rust

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            protobuf-compiler \
            libprotobuf-dev \
            build-essential \
            cmake \
            pkg-config \
            libcurl4-openssl-dev \
            libssl-dev \
            libsasl2-dev \
            zlib1g-dev \
            libzstd-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Run compose-backed integration tests
        run: make test-integration-compose

      - name: Tear down compose dependencies
        if: always()
        run: make test-compose-down

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [rust, integration-compose]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t pulse:ci .
