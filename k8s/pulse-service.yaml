apiVersion: v1
kind: Service
metadata:
  name: pulse
  namespace: pulse
  labels:
    app: pulse
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: "/metrics"
    prometheus.io/port: "9090"
spec:
  selector:
    app: pulse
  ports:
    - name: metrics
      port: 9090
      targetPort: metrics
