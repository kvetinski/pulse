apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - serviceaccount.yaml
  - rbac.yaml
  - redis.yaml
  - kafka.yaml
  - prometheus.yaml
  - configmap.yaml
  - pdb.yaml
  - pulse-service.yaml
  - grafana.yaml
  - deployment.yaml

configMapGenerator:
  - name: pulse-runtime-dashboard
    files:
      - pulse-runtime-dashboard.json=dashboards/pulse-runtime-dashboard.json

generatorOptions:
  disableNameSuffixHash: true
  labels:
    grafana_dashboard: "1"
