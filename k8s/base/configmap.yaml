apiVersion: v1
kind: ConfigMap
metadata:
  name: pulse-config
  namespace: pulse
data:
  RUST_LOG: "info"
  # Overlay-specific endpoint patch is required for each environment.
  PULSE_ENDPOINT: "http://replace-me:8080"
  # Overlay-specific scenarios file should override this path.
  PULSE_SCENARIOS_FILE: "/app/scenarios.yaml"
  PULSE_GRPC_DESCRIPTOR_SET: "/app/descriptors/services.pb"
  PULSE_KAFKA_BROKERS: "kafka:9092"
  PULSE_KAFKA_JOBS_TOPIC: "pulse.scenario.jobs"
  PULSE_KAFKA_RESULTS_TOPIC: "pulse.scenario.results"
  PULSE_KAFKA_DLQ_TOPIC: "pulse.scenario.dlq"
  PULSE_KAFKA_GROUP_ID: "pulse-workers"
  PULSE_QUEUE_CAPACITY: "1024"
  PULSE_WORKER_MAX_RETRIES: "2"
  PULSE_WORKER_RETRY_BASE_DELAY_MS: "500"
  PULSE_REDIS_URL: "redis://redis:6379"
  PULSE_REDIS_LEADER_KEY: "pulse:leader"
  PULSE_REDIS_SCHEDULE_PREFIX: "pulse:schedule"
  PULSE_REDIS_IDEMPOTENCY_PREFIX: "pulse:dedupe"
  PULSE_LEADER_LOCK_TTL_MS: "10000"
  PULSE_LEADER_RENEW_INTERVAL_MS: "3000"
  PULSE_SCHEDULER_TICK_INTERVAL_MS: "500"
  PULSE_METRICS_ENABLED: "true"
  PULSE_METRICS_BIND: "0.0.0.0:9090"
