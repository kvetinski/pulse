version: 1
scenarios:
  - name: DynamicGrpcCreateGet
    endpoint: http://account.account:8080
    scenarios_per_sec: 3
    max_concurrency: 10
    duration: 20s
    repeat:
      type: once
    partition_key_strategy: execution_key
    steps:
      - protocol: grpc
        service: account.v1.AccountService
        method: CreateAccount
        request_fields:
          phone: "${gen.phone}"
        extract:
          user_id: "account.id"
          created_phone: "account.phone"

      - protocol: grpc
        service: account.v1.AccountService
        method: GetAccount
        endpoint: http://account.account:8080
        request_fields:
          id: "${ctx.user_id}"
        extract:
          fetched_id: "account.id"
          fetched_phone: "account.phone"

  - name: DynamicGrpcGetStaticBase64
    endpoint: http://account.account:8080
    scenarios_per_sec: 20
    max_concurrency: 20
    duration: 5s
    repeat:
      type: every
      interval: 5s
    partition_key_strategy: execution_key
    steps:
      - protocol: grpc
        service: account.v1.AccountService
        method: CreateAccount
        request_fields:
          phone: "${gen.phone}"
        extract:
          user_id: "account.id"
      - protocol: grpc
        service: account.v1.AccountService
        method: GetAccount
        request_fields:
          id: "${ctx.user_id}"
        extract:
          fetched_id: "account.id"
          fetched_phone: "account.phone"
      - protocol: grpc
        service: account.v1.AccountService
        method: DeleteAccount
        request_fields:
          id: "${ctx.user_id}"
