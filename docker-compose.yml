services:
  kafka:
    image: apache/kafka:3.9.0
    container_name: pulse-kafka
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: "0"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
      KAFKA_PROCESS_ROLES: "controller,broker"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_LISTENERS: "PLAINTEXT://:9092,EXTERNAL://:19092,CONTROLLER://:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092,EXTERNAL://127.0.0.1:19092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "0@localhost:9093"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
    ports:
      - "19092:19092"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1",
        ]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: pulse-redis
    restart: unless-stopped
    ports:
      - "16379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  pulse:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pulse
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      RUST_LOG: ${RUST_LOG:-info}
      PULSE_ENDPOINT: ${PULSE_ENDPOINT:-http://host.docker.internal:8080}
      # Compose scenario config (k8s uses /app/scenarios.k8s.yaml).
      PULSE_SCENARIOS_FILE: ${PULSE_SCENARIOS_FILE:-/app/scenarios.yaml}
      PULSE_GRPC_DESCRIPTOR_SET: ${PULSE_GRPC_DESCRIPTOR_SET:-/app/descriptors/services.pb}
      PULSE_KAFKA_BROKERS: ${PULSE_KAFKA_BROKERS:-kafka:9092}
      PULSE_KAFKA_JOBS_TOPIC: ${PULSE_KAFKA_JOBS_TOPIC:-pulse.scenario.jobs}
      PULSE_KAFKA_RESULTS_TOPIC: ${PULSE_KAFKA_RESULTS_TOPIC:-pulse.scenario.results}
      PULSE_KAFKA_DLQ_TOPIC: ${PULSE_KAFKA_DLQ_TOPIC:-pulse.scenario.dlq}
      PULSE_KAFKA_GROUP_ID: ${PULSE_KAFKA_GROUP_ID:-pulse-workers}
      PULSE_QUEUE_CAPACITY: ${PULSE_QUEUE_CAPACITY:-1024}
      PULSE_WORKER_MAX_RETRIES: ${PULSE_WORKER_MAX_RETRIES:-2}
      PULSE_WORKER_RETRY_BASE_DELAY_MS: ${PULSE_WORKER_RETRY_BASE_DELAY_MS:-500}
      PULSE_REDIS_URL: ${PULSE_REDIS_URL:-redis://redis:6379}
      PULSE_REDIS_LEADER_KEY: ${PULSE_REDIS_LEADER_KEY:-pulse:leader}
      PULSE_REDIS_SCHEDULE_PREFIX: ${PULSE_REDIS_SCHEDULE_PREFIX:-pulse:schedule}
      PULSE_REDIS_IDEMPOTENCY_PREFIX: ${PULSE_REDIS_IDEMPOTENCY_PREFIX:-pulse:dedupe}
      PULSE_METRICS_ENABLED: ${PULSE_METRICS_ENABLED:-true}
      PULSE_METRICS_BIND: ${PULSE_METRICS_BIND:-0.0.0.0:9090}
    ports:
      - "19090:9090"
    volumes:
      - ./scenarios.yaml:/app/scenarios.yaml:ro
      - ./descriptors:/app/descriptors:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: pulse-prometheus
    restart: unless-stopped
    depends_on:
      - pulse
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    ports:
      - "19091:9090"
    volumes:
      - ./ops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:11.2.2
    container_name: pulse-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "13000:3000"
    volumes:
      - ./ops/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./ops/grafana/dashboards:/var/lib/grafana/dashboards:ro

networks:
  default:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/16
